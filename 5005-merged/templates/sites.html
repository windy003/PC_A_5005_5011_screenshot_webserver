<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择站点 - 文件服务器</title>
    <link rel="apple-touch-icon" sizes="2048x2048" href="{{ url_for('static', filename='2048x2048.png') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='2048x2048.png') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 26px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .site-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            transition: all 0.25s;
        }
        .site-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.2);
        }
        .site-icon { font-size: 40px; }
        .site-info { flex: 1; }
        .site-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .site-path { font-size: 13px; color: #999; }
        .site-arrow { font-size: 22px; color: #667eea; }
        .logout {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #999;
            font-size: 14px;
            text-decoration: none;
        }
        .logout:hover { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📁 文件服务器</h1>
        <div class="subtitle">请选择要访问的站点</div>

        {% for site in sites %}
            <a class="site-card" href="{{ url_for('index', site=site.key) }}">
                <div class="site-icon">{% if site.key == 'small' %}🖼️{% elif site.key == 'large' %}🗂️{% else %}📂{% endif %}</div>
                <div class="site-info">
                    <div class="site-name">{{ site.name }}</div>
                    <div class="site-path">/{{ site.key }}</div>
                </div>
                <div class="site-arrow">→</div>
            </a>
        {% endfor %}

        <a class="logout" href="{{ url_for('logout') }}">退出登录</a>
    </div>
</body>
</html>
